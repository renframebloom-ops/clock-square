  <!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Clock</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #191919;
    }

    .clock-widget {
      background: #a9b8a9;
      border-radius: 10px;
      padding: 14px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .time-display {
      font-family: 'Courier', monospace;
      font-weight: 300;
      font-size: 60px;
      color: #191919;
      letter-spacing: 0.04em;
      line-height: 1;
    }

    .time-display .colon {
      font-family: monospace;
      font-weight: 100;
      color: #191919;
    }

    .date-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .date-display, .day-display {
      font-family: 'Courier', monospace;
      font-weight: 300;
      font-size: 15px;
      color: #191919;
      letter-spacing: 0.1em;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="clock-widget">
    <div class="time-display">
      <span id="hours">00</span><span class="colon">:</span><span id="minutes">00</span>
    </div>
    <div class="date-row">
      <div class="date-display" id="date">----/--/--</div>
      <div class="day-display" id="day">---</div>
    </div>
  </div>

  <script>
    const DAYS = ['日', '月', '火', '水', '木', '金', '土'];

    function pad(n) {
      return String(n).padStart(2, '0');
    }

    function update() {
      const now = new Date();
      document.getElementById('hours').textContent = pad(now.getHours());
      document.getElementById('minutes').textContent = pad(now.getMinutes());

      const y = now.getFullYear();
      const mo = pad(now.getMonth() + 1);
      const d = pad(now.getDate());
      document.getElementById('date').textContent = `${y}/${mo}/${d}`;
      document.getElementById('day').textContent = `(${DAYS[now.getDay()]})`;
    }

    update();
    setInterval(update, 1000);
  </script>
</body>
</html>
    
  </body>
  
</html>
